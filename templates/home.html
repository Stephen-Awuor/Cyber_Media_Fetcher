<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Media Fetcher</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#0f172a;
            color:white;
            min-height:100vh;
        }

        .hero{
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .card-box{
            background:#1e293b;
            padding:40px;
            border-radius:20px;
            width:700px;
            box-shadow:0 0 25px rgba(0,0,0,.4);
        }

        .title{
            font-size:3rem;
            font-weight:700;
        }

        .subtitle{
            color:#94a3b8;
        }
    </style>
</head>

<body>

<div class="hero">

    <div class="card-box text-center">

        <h1 class="title">
            Cyber Media Fetcher
        </h1>

        <p class="subtitle">
            Download videos, audio and analyze URLs securely.
        </p>

        <form method="POST">
            {% csrf_token %}

            <div class="input-group mt-4">

                <input
                    type="url"
                    class="form-control form-control-lg"
                    placeholder="Paste video URL here..."
                    name="url"
                    required>

                <button class="btn btn-primary btn-lg">
                    Analyze
                </button>

            </div>
        </form>

        {% if url %}

         <div class="alert alert-success mt-4">

              URL received:

         <br>

              {{ url }}

          </div>

{% endif %}

        <div class="mt-4">

            <span class="badge bg-success">
                Secure
            </span>

            <span class="badge bg-info">
                Fast                                                                                                                                       
            </span>

            <span class="badge bg-warning text-dark">
                No Ads
            </span>

        </div>

    </div>

</div>

</body>
</html>
